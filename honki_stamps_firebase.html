<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>21時から本気出す部 🌙</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, 'Hiragino Sans', 'Yu Gothic', sans-serif;
      background: #f5f4f0;
      min-height: 100vh;
      padding: 1.5rem 1rem 3rem;
      color: #1a1a18;
    }

    .header { text-align: center; margin-bottom: 1.25rem; }
    .header h1 { font-size: 20px; font-weight: 600; color: #1a1a18; margin-bottom: 4px; }
    .header p { font-size: 13px; color: #888780; }

    .status-bar {
      text-align: center; font-size: 12px; margin-bottom: 1rem;
      padding: 6px 12px; border-radius: 20px; display: inline-block; width: 100%;
    }
    .status-bar.connected { color: #3B6D11; background: #EAF3DE; }
    .status-bar.disconnected { color: #A32D2D; background: #FCEBEB; }
    .status-bar.loading { color: #888780; background: #f0ede6; }

    /* 期間バー */
    .period-bar {
      max-width: 480px; margin: 0 auto 1.25rem;
      background: #fff; border: 1px solid #e8e6e0; border-radius: 14px;
      padding: 10px 16px; text-align: center;
    }
    .period-days {
      font-size: 15px; font-weight: 700; color: #EF9F27;
      letter-spacing: 0.03em;
    }
    .period-sub { font-size: 11px; color: #aaa; margin-top: 2px; }

    /* YouTube セクション */
    .youtube-section {
      max-width: 480px; margin: 0 auto 1.25rem;
      background: #fff; border: 1px solid #e8e6e0; border-radius: 16px; padding: 1rem;
    }
    .youtube-section h3 { font-size: 13px; font-weight: 600; color: #1a1a18; margin-bottom: 10px; }
    .sync-note { font-size: 11px; color: #888780; background: #f5f4f0; border-radius: 8px; padding: 6px 10px; margin-bottom: 10px; }
    .url-row { display: flex; gap: 6px; margin-bottom: 10px; }
    .url-input {
      flex: 1; border: 1px solid #d0cec8; border-radius: 10px;
      padding: 8px 10px; font-size: 13px; font-family: inherit;
      color: #1a1a18; outline: none; transition: border-color 0.15s;
    }
    .url-input:focus { border-color: #EF9F27; }
    .url-input::placeholder { color: #bbb; }
    .play-btn { background: #e00; color: #fff; border: none; border-radius: 10px; padding: 8px 12px; font-size: 13px; font-family: inherit; cursor: pointer; white-space: nowrap; transition: background 0.15s; }
    .play-btn:hover { background: #c00; }
    .stop-btn { background: transparent; border: 1px solid #d0cec8; border-radius: 10px; padding: 8px 10px; font-size: 13px; font-family: inherit; cursor: pointer; color: #888780; transition: background 0.15s; white-space: nowrap; }
    .stop-btn:hover { background: #f5f4f0; }
    .video-wrap { position: relative; width: 100%; padding-top: 56.25%; border-radius: 10px; overflow: hidden; background: #000; margin-bottom: 8px; display: none; }
    .video-wrap.show { display: block; }
    .video-wrap iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
    .newtab-btn { width: 100%; background: transparent; border: 1px solid #d0cec8; border-radius: 10px; padding: 7px; font-size: 12px; font-family: inherit; cursor: pointer; color: #888780; transition: background 0.15s; display: none; }
    .newtab-btn.show { display: block; }
    .newtab-btn:hover { background: #f5f4f0; color: #1a1a18; }
    .now-playing { font-size: 11px; color: #3B6D11; background: #EAF3DE; border-radius: 8px; padding: 6px 10px; margin-bottom: 8px; display: none; }
    .now-playing.show { display: block; }

    .bulk-start-area { max-width: 480px; margin: 0 auto 1.25rem; }
    .bulk-start-btn {
      width: 100%; background: #1a1a18; color: #fff; border: none;
      border-radius: 14px; padding: 14px; font-size: 15px; font-weight: 600;
      font-family: inherit; cursor: pointer; transition: background 0.15s, transform 0.1s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .bulk-start-btn:hover { background: #333; }
    .bulk-start-btn:active { transform: scale(0.98); }

    .reward-banner {
      background: #FAEEDA; border: 1px solid #FAC775; border-radius: 14px;
      padding: 1rem 1.25rem; margin-bottom: 1.25rem; display: none;
      align-items: center; gap: 12px; max-width: 480px; margin-left: auto; margin-right: auto;
    }
    .reward-banner.show { display: flex; animation: pop 0.4s ease; }
    .reward-emoji { font-size: 28px; }
    .reward-text { font-size: 14px; color: #412402; }
    .reward-text strong { font-weight: 600; }

    /* 凡例 */
    .legend {
      max-width: 480px; margin: 0 auto 1rem;
      display: flex; gap: 12px; font-size: 11px; color: #888780;
    }
    .legend-item { display: flex; align-items: center; gap: 4px; }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; }

    .member-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; max-width: 480px; margin: 0 auto; }

    .member-card {
      background: #fff; border: 2px solid #e8e6e0;
      border-radius: 16px; padding: 1rem; transition: border-color 0.3s;
    }
    /* 入室状態 */
    .member-card.online  { border-color: #5cb85c; }
    .member-card.offline { border-color: #e05c5c; }
    /* まとめて開始中 → 青 */
    .member-card.bulk-running { border-color: #4A90D9; background: #f0f6ff; }
    /* 個人開始中 → オレンジ */
    .member-card.solo-running { border-color: #EF9F27; background: #fffbf0; }

    .member-top { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .avatar-wrap { position: relative; flex-shrink: 0; }
    .avatar { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 600; }
    .presence-dot { position: absolute; bottom: 0; right: 0; width: 11px; height: 11px; border-radius: 50%; border: 2px solid #fff; transition: background 0.3s; }
    .presence-dot.online  { background: #5cb85c; animation: pulse-green 2s infinite; }
    .presence-dot.offline { background: #e05c5c; }

    @keyframes pulse-green {
      0%,100% { box-shadow: 0 0 0 0 rgba(92,184,92,0.5); }
      50%      { box-shadow: 0 0 0 4px rgba(92,184,92,0); }
    }

    .member-info { flex: 1; min-width: 0; }
    .member-name-row { display: flex; align-items: center; justify-content: space-between; gap: 6px; }
    .member-name { font-size: 15px; font-weight: 600; color: #1a1a18; }
    .member-status { font-size: 11px; color: #888780; margin-top: 2px; }

    /* 累計スタンプ表示 */
    .cumulative {
      display: flex; align-items: center; gap: 5px;
      background: #f5f4f0; border-radius: 8px; padding: 5px 8px; margin-bottom: 8px;
    }
    .cumulative-label { font-size: 10px; color: #888780; }
    .cumulative-num { font-size: 18px; font-weight: 700; color: #EF9F27; line-height: 1; }
    .cumulative-unit { font-size: 10px; color: #888780; }

    .toggle-switch { position: relative; width: 38px; height: 22px; flex-shrink: 0; }
    .toggle-switch input { opacity: 0; width: 0; height: 0; }
    .toggle-slider { position: absolute; inset: 0; background: #e05c5c; border-radius: 22px; cursor: pointer; transition: background 0.3s; }
    .toggle-slider:before { content: ''; position: absolute; width: 16px; height: 16px; left: 3px; top: 3px; background: #fff; border-radius: 50%; transition: transform 0.3s; }
    .toggle-switch input:checked + .toggle-slider { background: #5cb85c; }
    .toggle-switch input:checked + .toggle-slider:before { transform: translateX(16px); }

    .stamps { display: flex; gap: 5px; margin-bottom: 10px; flex-wrap: wrap; }
    .stamp { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; border: 1.5px dashed #ccc; color: #ccc; }
    .stamp.earned { border: none; background: #FAC775; animation: pop 0.35s ease; }
    .stamp.earned-crown { border: none; background: linear-gradient(135deg, #f6d365, #fda085); animation: pop 0.35s ease, glow 1.5s ease-in-out infinite alternate; }

    @keyframes pop { 0%{transform:scale(0.5);opacity:0} 80%{transform:scale(1.2)} 100%{transform:scale(1);opacity:1} }
    @keyframes glow { from{box-shadow:0 0 4px rgba(253,160,133,0.4)} to{box-shadow:0 0 12px rgba(253,160,133,0.9)} }

    .progress-bar { height: 5px; background: #f0ede6; border-radius: 3px; overflow: hidden; margin-bottom: 8px; }
    .progress-fill { height: 100%; background: #EF9F27; border-radius: 3px; transition: width 0.1s linear; }
    /* 個人計測中はオレンジのプログレス、まとめては青 */
    .solo-running .progress-fill  { background: #EF9F27; }
    .bulk-running .progress-fill  { background: #4A90D9; }

    .btn-row { display: flex; gap: 6px; margin-bottom: 6px; }
    .join-btn {
      flex: 1; background: transparent; border: 1px solid #d0cec8; border-radius: 10px;
      padding: 8px 4px; font-size: 12px; font-family: inherit; cursor: pointer; color: #1a1a18;
      display: flex; align-items: center; justify-content: center; gap: 4px;
      transition: background 0.15s, opacity 0.15s;
    }
    .join-btn:hover:not(:disabled) { background: #f5f4f0; }
    .join-btn:active:not(:disabled) { transform: scale(0.98); }
    .join-btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .join-btn.waiting-bulk { color: #4A90D9; border-color: #4A90D9; background: #f0f6ff; }
    .join-btn.waiting-solo { color: #BA7517; border-color: #FAC775; background: #fdf6e8; }
    .join-btn.done { color: #3B6D11; border-color: #97C459; background: #f2f9e8; }

    .cancel-btn { background: transparent; border: 1px solid #f09595; border-radius: 10px; padding: 8px 8px; font-size: 12px; font-family: inherit; cursor: pointer; color: #A32D2D; transition: background 0.15s; white-space: nowrap; }
    .cancel-btn:hover { background: #fff0f0; }
    .reset-individual-btn { width: 100%; background: transparent; border: 1px solid #e8e6e0; border-radius: 10px; padding: 5px 6px; font-size: 11px; font-family: inherit; cursor: pointer; color: #aaa; transition: background 0.15s, color 0.15s; }
    .reset-individual-btn:hover { background: #fff0f0; color: #A32D2D; border-color: #f09595; }
    .timer-txt { font-size: 11px; font-weight: 600; }

    /* 土日自主トレ */
    .weekend-section {
      max-width: 480px; margin: 1.25rem auto 0;
      background: #fff; border: 1px solid #e8e6e0; border-radius: 16px; padding: 1rem;
    }
    .weekend-section h3 { font-size: 14px; font-weight: 600; color: #1a1a18; margin-bottom: 12px; }
    .weekend-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .weekend-card {
      border: 1.5px solid #e8e6e0; border-radius: 14px; padding: 10px;
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      transition: border-color 0.3s;
    }
    .weekend-card.w-running { border-color: #EF9F27; background: #fffbf0; }
    .weekend-avatar {
      width: 34px; height: 34px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 600;
    }
    .weekend-count {
      font-size: 13px; font-weight: 700; color: #EF9F27;
      display: flex; align-items: baseline; gap: 2px;
    }
    .weekend-count .num { font-size: 20px; line-height: 1; }
    .weekend-count .denom { font-size: 11px; color: #aaa; }
    .weekend-btn {
      width: 100%; background: transparent; border: 1px solid #d0cec8;
      border-radius: 10px; padding: 6px 4px; font-size: 11px; font-family: inherit;
      cursor: pointer; color: #1a1a18; display: flex; align-items: center;
      justify-content: center; gap: 4px; transition: background 0.15s;
    }
    .weekend-btn:hover:not(:disabled) { background: #f5f4f0; }
    .weekend-btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .weekend-btn.w-waiting { color: #BA7517; border-color: #FAC775; background: #fdf6e8; }
    .weekend-progress { height: 4px; background: #f0ede6; border-radius: 2px; overflow: hidden; width: 100%; }
    .weekend-progress-fill { height: 100%; background: #EF9F27; border-radius: 2px; transition: width 0.1s linear; }
  </style>
</head>
<body>

  <div class="header">
    <h1>🌙 21時から本気出す部</h1>
    <p>5/18〜7/4 がんばろう！💪</p>
  </div>

  <div id="status-bar" class="status-bar loading">接続中...</div>

  <!-- 期間プログレスバー -->
  <div class="period-bar">
    <div class="period-days" id="period-days"></div>
    <div class="period-sub">5/18 〜 7/4 がんばろう 💪</div>
  </div>

  <!-- YouTube セクション -->
  <div class="youtube-section">
    <h3>▶️ YouTube 同時再生</h3>
    <div class="sync-note">📡 再生・停止は全員の画面に同時に反映されます</div>
    <div class="now-playing" id="now-playing">▶️ 再生中...</div>
    <div class="url-row">
      <input class="url-input" id="yt-url" type="text" placeholder="YouTubeのURLを貼り付け" />
      <button class="play-btn" onclick="window.syncPlay()">再生</button>
      <button class="stop-btn" onclick="window.syncStop()">停止</button>
    </div>
    <div class="video-wrap" id="video-wrap">
      <iframe id="yt-iframe" allowfullscreen allow="autoplay; encrypted-media"></iframe>
    </div>
    <button class="newtab-btn" id="newtab-btn" onclick="window.openNewTab()">🔗 別タブで開く</button>
  </div>

  <div class="bulk-start-area">
    <button class="bulk-start-btn" onclick="window.bulkStart()">🔥 まとめて本気トレ開始！</button>
  </div>

  <div id="reward-banner" class="reward-banner">
    <span class="reward-emoji">👑</span>
    <div class="reward-text"><strong id="reward-name"></strong>さんがご褒美ゲット！おめでとう🎉</div>
  </div>

  <!-- 凡例 -->
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#4A90D9"></div>まとめて計測中</div>
    <div class="legend-item"><div class="legend-dot" style="background:#EF9F27"></div>個人計測中</div>
    <div class="legend-item"><div class="legend-dot" style="background:#5cb85c"></div>入室中</div>
    <div class="legend-item"><div class="legend-dot" style="background:#e05c5c"></div>未入室</div>
  </div>

  <div class="member-grid" id="member-grid"></div>

  <!-- 土日自主トレ枠 -->
  <div class="weekend-section">
    <h3>🏃 土日自主トレ</h3>
    <div class="weekend-grid" id="weekend-grid"></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCHeiK7IYCVZY94n3W9wZ9a4622JuMzSYQ",
      authDomain: "honki-stamps.firebaseapp.com",
      databaseURL: "https://honki-stamps-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "honki-stamps",
      storageBucket: "honki-stamps.firebasestorage.app",
      messagingSenderId: "142735001715",
      appId: "1:142735001715:web:53307c7d1a6a0a17cb0206"
    };

    const app = initializeApp(firebaseConfig);
    const db  = getDatabase(app);

    const MEMBERS = [
      { id: 0, name: "澤田", initials: "澤", bg: "#B5D4F4", fg: "#0C447C" },
      { id: 1, name: "渡辺", initials: "渡", bg: "#F4C0D1", fg: "#72243E" },
      { id: 2, name: "名田", initials: "名", bg: "#9FE1CB", fg: "#085041" },
      { id: 3, name: "山田", initials: "山", bg: "#CECBF6", fg: "#3C3489" },
    ];

    const WAIT_MS    = 3 * 60 * 1000; // 3分
    const MAX_STAMPS = 5;

    // 期間設定
    const PERIOD_START  = new Date('2026-05-18T00:00:00').getTime();
    const PERIOD_END    = new Date('2026-07-04T23:59:59').getTime();
    const PERIOD_DAYS   = 35; // 平日のみ（5/18〜7/4） // 5/18〜7/4の日数（分母）

    // 期間プログレスバー
    function updatePeriod() {
      const now    = Date.now();
      const remain = Math.max(0, Math.ceil((PERIOD_END - now) / (1000 * 60 * 60 * 24)));
      const el     = document.getElementById('period-days');
      if (remain > 0) {
        el.innerHTML = `🌟 あと <span style="font-size:22px">${remain}</span> 日！`;
      } else {
        el.innerHTML = `🎉 期間終了！お疲れさまでした！`;
      }
    }
    updatePeriod();
    setInterval(updatePeriod, 60000);

    let stamps     = [0, 0, 0, 0];
    let stampTypes = [[],[],[],[]]; // 各スタンプのmode記録
    let cumulative = [6, 4, 4, 4]; // 累計スタンプ（初期値：澤田6・渡辺4・名田4・山田4）
    let presence   = [false, false, false, false];
    // joinedAts に mode ('bulk' or 'solo') も持たせる
    let joinedAts  = [null, null, null, null]; // {time, mode} or null
    let tickTimers = [null, null, null, null];

    const statusBar      = document.getElementById('status-bar');
    const stampsRef      = ref(db, 'stamps');
    const cumulativeRef  = ref(db, 'cumulative');
    const presenceRef    = ref(db, 'presence');
    const joinedAtsRef   = ref(db, 'joinedAts');
    const stampTypesRef  = ref(db, 'stampTypes');
    const videoRef       = ref(db, 'video');

    // YouTube
    function extractVideoId(url) {
      const patterns = [
        /(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([^&\n?#]+)/,
        /youtube\.com\/shorts\/([^&\n?#]+)/
      ];
      for (const p of patterns) { const m = url.match(p); if (m) return m[1]; }
      return null;
    }

    function applyVideoState(state) {
      const wrap = document.getElementById('video-wrap');
      const iframe = document.getElementById('yt-iframe');
      const newtab = document.getElementById('newtab-btn');
      const nowPlaying = document.getElementById('now-playing');
      if (state && state.videoId) {
        const embedUrl = `https://www.youtube.com/embed/${state.videoId}?autoplay=1`;
        if (!iframe.src.includes(state.videoId)) iframe.src = embedUrl;
        wrap.classList.add('show'); newtab.classList.add('show'); nowPlaying.classList.add('show');
        nowPlaying.textContent = `▶️ 再生中`;
        document.getElementById('yt-url').value = `https://youtu.be/${state.videoId}`;
      } else {
        iframe.src = '';
        wrap.classList.remove('show'); newtab.classList.remove('show'); nowPlaying.classList.remove('show');
      }
    }

    onValue(videoRef, (snapshot) => { applyVideoState(snapshot.val()); });

    window.syncPlay = function() {
      const url = document.getElementById('yt-url').value.trim();
      if (!url) return;
      const id = extractVideoId(url);
      if (!id) { alert('YouTubeのURLを正しく入力してください'); return; }
      set(videoRef, { videoId: id, startedAt: Date.now() });
    };
    window.syncStop = function() { set(videoRef, null); };
    window.openNewTab = function() {
      const url = document.getElementById('yt-url').value.trim();
      if (url) window.open(url, '_blank');
    };
    document.getElementById('yt-url').addEventListener('keydown', e => { if (e.key === 'Enter') window.syncPlay(); });

    // Firebase同期
    onValue(stampsRef, (snapshot) => {
      const data = snapshot.val();
      if (data) stamps = data;
      statusBar.textContent = '✅ リアルタイム同期中';
      statusBar.className = 'status-bar connected';
      render();
    }, () => {
      statusBar.textContent = '❌ 接続エラー';
      statusBar.className = 'status-bar disconnected';
    });

    onValue(cumulativeRef, (snapshot) => {
      const data = snapshot.val();
      if (data) {
        cumulative = [
          Math.max(data[0] || 0, 6),
          Math.max(data[1] || 0, 4),
          Math.max(data[2] || 0, 4),
          Math.max(data[3] || 0, 4),
        ];
      } else {
        set(cumulativeRef, cumulative);
      }
      render();
    });

    onValue(presenceRef, (snapshot) => {
      const data = snapshot.val();
      if (data) presence = data;
      render();
    });

    onValue(joinedAtsRef, (snapshot) => {
      const data = snapshot.val();
      const prev = joinedAts.map(j => j);
      joinedAts = data ? data : [null, null, null, null];
      MEMBERS.forEach((_, i) => {
        const wasNull = !prev[i];
        const isNow   = !!joinedAts[i];
        if (isNow && wasNull) startTick(i);
        if (!isNow && tickTimers[i]) { clearInterval(tickTimers[i]); tickTimers[i] = null; }
      });
      render();
    });

    onValue(stampTypesRef, (snapshot) => {
      const data = snapshot.val();
      if (data) stampTypes = data;
      render();
    });

    function startTick(i) {
      if (tickTimers[i]) clearInterval(tickTimers[i]);
      tickTimers[i] = setInterval(() => {
        if (!joinedAts[i]) { clearInterval(tickTimers[i]); tickTimers[i] = null; return; }
        const elapsed = Date.now() - joinedAts[i].time;
        if (elapsed >= WAIT_MS) {
          clearInterval(tickTimers[i]); tickTimers[i] = null;
          // スタンプ付与（modeを記録）
          const mode = joinedAts[i].mode;
          const newCount = (stamps[i] || 0) + 1;
          cumulative[i] = (cumulative[i] || 0) + 1;
          if (!stampTypes[i]) stampTypes[i] = [];
          stampTypes[i].push(mode); // 'bulk' or 'solo'
          // 5個でリセット
          if (newCount >= MAX_STAMPS) {
            stamps[i] = 0;
            stampTypes[i] = [];
          } else {
            stamps[i] = newCount;
          }
          joinedAts[i] = null;
          set(stampsRef,     stamps);
          set(cumulativeRef, cumulative);
          set(joinedAtsRef,  joinedAts);
          set(stampTypesRef, stampTypes);
          render();
          // 5個ちょうどでご褒美
          if (cumulative[i] % MAX_STAMPS === 0) {
            const banner = document.getElementById('reward-banner');
            document.getElementById('reward-name').textContent = MEMBERS[i].name;
            banner.classList.add('show');
            setTimeout(() => banner.classList.remove('show'), 5000);
          }
          return;
        }
        const pct    = Math.min(100, elapsed / WAIT_MS * 100);
        const remain = Math.max(0, WAIT_MS - elapsed);
        const mins   = Math.floor(remain / 60000);
        const secs   = Math.floor((remain % 60000) / 1000);
        const prog   = document.getElementById(`prog-${i}`);
        const btn    = document.getElementById(`btn-${i}`);
        if (prog) prog.style.width = pct.toFixed(1) + '%';
        if (btn)  btn.innerHTML = `<span class="timer-txt">⏱ ${mins}:${secs.toString().padStart(2,'0')} 待機中...</span>`;
      }, 500);
    }

    function render() {
      const grid = document.getElementById('member-grid');
      grid.innerHTML = '';
      MEMBERS.forEach((m, i) => {
        const s         = stamps[i] || 0;
        const cum       = cumulative[i] || 0;
        const isOn      = presence[i] || false;
        const joinData  = joinedAts[i] || null;
        const isJoining = !!joinData;
        const mode      = joinData ? joinData.mode : null; // 'bulk' or 'solo'

        if (isJoining && !tickTimers[i]) startTick(i);

        let stampsHtml = '';
        const types = stampTypes[i] || [];
        for (let j = 0; j < MAX_STAMPS; j++) {
          if (j < s) {
            const icon = (types[j] === 'solo') ? '💛' : '⭐';
            stampsHtml += `<div class="stamp earned">${icon}</div>`;
          } else if (j === MAX_STAMPS - 1) {
            stampsHtml += `<div class="stamp" style="border-color:#fda085;color:#fda085;font-size:12px;">👑</div>`;
          } else {
            stampsHtml += `<div class="stamp">○</div>`;
          }
        }

        // カードクラス
        let cardClass = 'member-card';
        if (isJoining && mode === 'bulk') cardClass += ' bulk-running';
        else if (isJoining && mode === 'solo') cardClass += ' solo-running';
        else if (isOn) cardClass += ' online';
        else cardClass += ' offline';

        let btnRowHtml = '', progressHtml = '';
        if (isJoining) {
          const elapsed = Date.now() - joinData.time;
          const remain  = Math.max(0, WAIT_MS - elapsed);
          const mins    = Math.floor(remain / 60000);
          const secs    = Math.floor((remain % 60000) / 1000);
          const pct     = Math.min(100, elapsed / WAIT_MS * 100);
          const btnCls  = mode === 'bulk' ? 'waiting-bulk' : 'waiting-solo';
          const modeLabel = mode === 'bulk' ? '🔵 まとめて' : '🟠 個人';
          progressHtml  = `<div class="progress-bar"><div class="progress-fill" id="prog-${i}" style="width:${pct.toFixed(1)}%"></div></div>`;
          btnRowHtml    = `
            <div class="btn-row">
              <button class="join-btn ${btnCls}" id="btn-${i}" disabled>
                <span class="timer-txt">${modeLabel} ⏱ ${mins}:${secs.toString().padStart(2,'0')}</span>
              </button>
              <button class="cancel-btn" onclick="window.cancelTimer(${i})">✕</button>
            </div>`;
        } else {
          btnRowHtml = `
            <div class="btn-row">
              <button class="join-btn" id="btn-${i}" onclick="window.handleJoin(${i})">🔥 本気トレ開始！</button>
            </div>`;
        }

        const card = document.createElement('div');
        card.className = cardClass;
        card.innerHTML = `
          <div class="member-top">
            <div class="avatar-wrap">
              <div class="avatar" style="background:${m.bg};color:${m.fg}">${m.initials}</div>
              <div class="presence-dot ${isOn ? 'online' : 'offline'}"></div>
            </div>
            <div class="member-info">
              <div class="member-name-row">
                <label class="toggle-switch">
                  <input type="checkbox" ${isOn ? 'checked' : ''} onchange="window.togglePresence(${i}, this.checked)">
                  <span class="toggle-slider"></span>
                </label>
              </div>
              <div class="member-status">${isJoining ? (mode === 'bulk' ? '🔵 まとめて計測中' : '🟠 個人計測中') : ''}</div>
            </div>
          </div>
          <div class="cumulative">
            <span class="cumulative-label">📊 通算</span>
            <span class="cumulative-num">${cum}</span>
            <span class="cumulative-unit">/ ${PERIOD_DAYS} スタンプ</span>
          </div>
          <div class="stamps">${stampsHtml}</div>
          ${progressHtml}
          ${btnRowHtml}
        `;
        grid.appendChild(card);
      });
    }

    // 個人「本気トレ開始！」
    window.handleJoin = function(i) {
      if (joinedAts[i] || (stamps[i] || 0) >= MAX_STAMPS) return;
      joinedAts[i] = { time: Date.now(), mode: 'solo' };
      set(joinedAtsRef, joinedAts);
      startTick(i);
      render();
    };

    // まとめて開始（ONの人だけ・modeはbulk）
    window.bulkStart = function() {
      const targets = MEMBERS.filter((_, i) => presence[i] && !joinedAts[i]);
      if (targets.length === 0) {
        alert('入室中（緑）のメンバーがいないか、全員すでに計測中です。');
        return;
      }
      const now = Date.now();
      targets.forEach(m => { joinedAts[m.id] = { time: now, mode: 'bulk' }; startTick(m.id); });
      set(joinedAtsRef, joinedAts);
      render();
    };

    window.togglePresence = function(i, val) {
      presence[i] = val;
      set(presenceRef, presence);
      render();
    };

    window.cancelTimer = function(i) {
      if (!confirm(`${MEMBERS[i].name}さんの待機をキャンセルしますか？\n（スタンプはそのままです）`)) return;
      if (tickTimers[i]) { clearInterval(tickTimers[i]); tickTimers[i] = null; }
      joinedAts[i] = null;
      set(joinedAtsRef, joinedAts);
      render();
    };

    // スタンプ（現在）と累計両方リセット
    window.resetOne = function(i) {
      if (!confirm(`${MEMBERS[i].name}さんのスタンプをリセットしますか？\n（現在のスタンプと通算スタンプが0になります）`)) return;
      if (tickTimers[i]) { clearInterval(tickTimers[i]); tickTimers[i] = null; }
      joinedAts[i]  = null;
      stamps[i]     = 0;
      cumulative[i] = 0;
      set(joinedAtsRef,  joinedAts);
      set(stampsRef,     stamps);
      set(cumulativeRef, cumulative);
      render();
    };

    // ---- 土日自主トレ ----
    const WEEKEND_MAX = 12;
    const WEEKEND_WAIT_MS = 3 * 60 * 1000; // 3分

    let weekendStamps  = [0, 0, 0, 0];
    let weekendJoining = [false, false, false, false];
    let weekendJoinedAt = [null, null, null, null];
    let weekendTimers  = [null, null, null, null];

    const weekendRef = ref(db, 'weekendStamps');

    onValue(weekendRef, (snapshot) => {
      const data = snapshot.val();
      if (data) weekendStamps = data;
      renderWeekend();
    });

    function renderWeekend() {
      const grid = document.getElementById('weekend-grid');
      if (!grid) return;
      grid.innerHTML = '';
      MEMBERS.forEach((m, i) => {
        const count = weekendStamps[i] || 0;
        const isJoining = weekendJoining[i];

        let btnHtml = '', progressHtml = '';
        if (isJoining) {
          const elapsed = Date.now() - weekendJoinedAt[i];
          const remain  = Math.max(0, WEEKEND_WAIT_MS - elapsed);
          const mins    = Math.floor(remain / 60000);
          const secs    = Math.floor((remain % 60000) / 1000);
          const pct     = Math.min(100, elapsed / WEEKEND_WAIT_MS * 100);
          progressHtml = `<div class="weekend-progress"><div class="weekend-progress-fill" id="wprog-${i}" style="width:${pct.toFixed(1)}%"></div></div>`;
          btnHtml = `<button class="weekend-btn w-waiting" id="wbtn-${i}" disabled><span class="timer-txt">⏱ ${mins}:${secs.toString().padStart(2,'0')}</span></button>`;
        } else {
          btnHtml = `<button class="weekend-btn" onclick="window.weekendJoin(${i})">🔥 本気トレ開始！</button>`;
        }

        const card = document.createElement('div');
        card.className = `weekend-card${isJoining ? ' w-running' : ''}`;
        card.innerHTML = `
          <div class="weekend-avatar" style="background:${m.bg};color:${m.fg}">${m.initials}</div>
          <div class="weekend-count">
            <span class="num">${count}</span>
            <span class="denom">/ ${WEEKEND_MAX}</span>
          </div>
          ${progressHtml}
          ${btnHtml}
        `;
        grid.appendChild(card);
      });
    }

    window.weekendJoin = function(i) {
      if (weekendJoining[i]) return;
      weekendJoining[i]  = true;
      weekendJoinedAt[i] = Date.now();
      renderWeekend();

      weekendTimers[i] = setInterval(() => {
        const elapsed = Date.now() - weekendJoinedAt[i];
        const pct     = Math.min(100, elapsed / WEEKEND_WAIT_MS * 100);
        const remain  = Math.max(0, WEEKEND_WAIT_MS - elapsed);
        const mins    = Math.floor(remain / 60000);
        const secs    = Math.floor((remain % 60000) / 1000);
        const prog = document.getElementById(`wprog-${i}`);
        const btn  = document.getElementById(`wbtn-${i}`);
        if (prog) prog.style.width = pct.toFixed(1) + '%';
        if (btn)  btn.innerHTML = `<span class="timer-txt">⏱ ${mins}:${secs.toString().padStart(2,'0')}</span>`;

        if (elapsed >= WEEKEND_WAIT_MS) {
          clearInterval(weekendTimers[i]);
          weekendJoining[i]  = false;
          weekendJoinedAt[i] = null;
          weekendStamps[i]   = (weekendStamps[i] || 0) + 1;
          set(weekendRef, weekendStamps);
          renderWeekend();
        }
      }, 500);
    };

    renderWeekend();
    render();
  </script>
</body>
</html>
