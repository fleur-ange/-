<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>21時から本気出す部 🌙</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, 'Hiragino Sans', 'Yu Gothic', sans-serif;
      background: #f5f4f0;
      min-height: 100vh;
      padding: 1.5rem 1rem 3rem;
      color: #1a1a18;
    }

    .header {
      text-align: center;
      margin-bottom: 1.75rem;
    }
    .header h1 {
      font-size: 20px;
      font-weight: 600;
      color: #1a1a18;
      margin-bottom: 4px;
    }
    .header p {
      font-size: 13px;
      color: #888780;
    }

    .status-bar {
      text-align: center;
      font-size: 12px;
      margin-bottom: 1rem;
      padding: 6px 12px;
      border-radius: 20px;
      display: inline-block;
      width: 100%;
    }
    .status-bar.connected { color: #3B6D11; background: #EAF3DE; }
    .status-bar.disconnected { color: #A32D2D; background: #FCEBEB; }
    .status-bar.loading { color: #888780; background: #f0ede6; }

    .reward-banner {
      background: #FAEEDA;
      border: 1px solid #FAC775;
      border-radius: 14px;
      padding: 1rem 1.25rem;
      margin-bottom: 1.25rem;
      display: none;
      align-items: center;
      gap: 12px;
    }
    .reward-banner.show { display: flex; animation: pop 0.4s ease; }
    .reward-emoji { font-size: 28px; }
    .reward-text { font-size: 14px; color: #412402; }
    .reward-text strong { font-weight: 600; }

    .member-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      max-width: 480px;
      margin: 0 auto;
    }

    .member-card {
      background: #fff;
      border: 1px solid #e8e6e0;
      border-radius: 16px;
      padding: 1rem;
    }

    .member-top {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 600;
      flex-shrink: 0;
    }

    .member-name { font-size: 15px; font-weight: 600; color: #1a1a18; }
    .member-status { font-size: 11px; color: #888780; margin-top: 2px; }

    .stamps {
      display: flex;
      gap: 5px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .stamp {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      border: 1.5px dashed #ccc;
      color: #ccc;
      transition: all 0.3s;
    }
    .stamp.earned {
      border: none;
      background: #FAC775;
      animation: pop 0.35s ease;
    }
    .stamp.earned-crown {
      border: none;
      background: linear-gradient(135deg, #f6d365, #fda085);
      animation: pop 0.35s ease, glow 1.5s ease-in-out infinite alternate;
      box-shadow: 0 0 8px rgba(253, 160, 133, 0.6);
    }

    @keyframes pop {
      0%   { transform: scale(0.5); opacity: 0; }
      80%  { transform: scale(1.2); }
      100% { transform: scale(1);   opacity: 1; }
    }

    @keyframes glow {
      from { box-shadow: 0 0 4px rgba(253, 160, 133, 0.4); }
      to   { box-shadow: 0 0 12px rgba(253, 160, 133, 0.9); }
    }

    .progress-bar {
      height: 5px;
      background: #f0ede6;
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 10px;
    }
    .progress-fill {
      height: 100%;
      background: #EF9F27;
      border-radius: 3px;
      transition: width 0.2s linear;
    }

    .join-btn {
      width: 100%;
      background: transparent;
      border: 1px solid #d0cec8;
      border-radius: 10px;
      padding: 8px 6px;
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      color: #1a1a18;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: background 0.15s, opacity 0.15s;
      margin-bottom: 6px;
    }
    .join-btn:hover:not(:disabled) { background: #f5f4f0; }
    .join-btn:active:not(:disabled) { transform: scale(0.98); }
    .join-btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .join-btn.waiting { color: #BA7517; border-color: #FAC775; background: #fdf6e8; }
    .join-btn.done { color: #3B6D11; border-color: #97C459; background: #f2f9e8; }

    .reset-individual-btn {
      width: 100%;
      background: transparent;
      border: 1px solid #e8e6e0;
      border-radius: 10px;
      padding: 5px 6px;
      font-size: 11px;
      font-family: inherit;
      cursor: pointer;
      color: #aaa;
      transition: background 0.15s, color 0.15s;
    }
    .reset-individual-btn:hover { background: #fff0f0; color: #A32D2D; border-color: #f09595; }

    .timer-txt { font-size: 12px; font-weight: 600; }
  </style>
</head>
<body>

  <div class="header">
    <h1>🌙 21時から本気出す部</h1>
    <p>参加から3分でスタンプ獲得 ・ 5個でご褒美！👑</p>
  </div>

  <div id="status-bar" class="status-bar loading">接続中...</div>

  <div id="reward-banner" class="reward-banner">
    <span class="reward-emoji">👑</span>
    <div class="reward-text"><strong id="reward-name"></strong>さんがご褒美ゲット！おめでとう🎉</div>
  </div>

  <div class="member-grid" id="member-grid"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCHeiK7IYCVZY94n3W9wZ9a4622JuMzSYQ",
      authDomain: "honki-stamps.firebaseapp.com",
      databaseURL: "https://honki-stamps-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "honki-stamps",
      storageBucket: "honki-stamps.firebasestorage.app",
      messagingSenderId: "142735001715",
      appId: "1:142735001715:web:53307c7d1a6a0a17cb0206"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const MEMBERS = [
      { id: 0, name: "澤田", initials: "澤", bg: "#B5D4F4", fg: "#0C447C" },
      { id: 1, name: "渡辺", initials: "渡", bg: "#F4C0D1", fg: "#72243E" },
      { id: 2, name: "名田", initials: "名", bg: "#9FE1CB", fg: "#085041" },
      { id: 3, name: "山田", initials: "山", bg: "#CECBF6", fg: "#3C3489" },
    ];

    const WAIT_MS = 3 * 60 * 1000;
    const MAX_STAMPS = 5;

    let stamps = [0, 0, 0, 0];
    let timers = [null, null, null, null];
    let joining = [false, false, false, false];
    let joinedAt = [null, null, null, null];

    const statusBar = document.getElementById('status-bar');
    const stampsRef = ref(db, 'stamps');

    onValue(stampsRef, (snapshot) => {
      const data = snapshot.val();
      if (data) stamps = data;
      statusBar.textContent = '✅ リアルタイム同期中';
      statusBar.className = 'status-bar connected';
      render();
    }, () => {
      statusBar.textContent = '❌ 接続エラー';
      statusBar.className = 'status-bar disconnected';
    });

    function saveStamps() {
      set(stampsRef, stamps);
    }

    function render() {
      const grid = document.getElementById('member-grid');
      grid.innerHTML = '';
      MEMBERS.forEach((m, i) => {
        const s = stamps[i] || 0;
        const full = s >= MAX_STAMPS;

        let stampsHtml = '';
        for (let j = 0; j < MAX_STAMPS; j++) {
          if (j < s) {
            // 5個目（index=4）は王冠
            if (j === MAX_STAMPS - 1) {
              stampsHtml += `<div class="stamp earned-crown">👑</div>`;
            } else {
              stampsHtml += `<div class="stamp earned">⭐</div>`;
            }
          } else {
            // 5個目の空欄は王冠の枠
            if (j === MAX_STAMPS - 1) {
              stampsHtml += `<div class="stamp" style="border-color:#fda085;color:#fda085;font-size:13px;">👑</div>`;
            } else {
              stampsHtml += `<div class="stamp">○</div>`;
            }
          }
        }

        let btnClass = 'join-btn';
        let btnDisabled = '';
        let btnContent = '';
        let progressHtml = '';

        if (full) {
          btnClass += ' done';
          btnContent = '👑 ご褒美ずみ';
          btnDisabled = 'disabled';
        } else if (joining[i]) {
          const elapsed = Date.now() - joinedAt[i];
          const remain = Math.max(0, WAIT_MS - elapsed);
          const mins = Math.floor(remain / 60000);
          const secs = Math.floor((remain % 60000) / 1000);
          const pct = Math.min(100, elapsed / WAIT_MS * 100);
          btnClass += ' waiting';
          btnDisabled = 'disabled';
          btnContent = `<span class="timer-txt">⏱ ${mins}:${secs.toString().padStart(2,'0')} 待機中...</span>`;
          progressHtml = `<div class="progress-bar"><div class="progress-fill" id="prog-${i}" style="width:${pct.toFixed(1)}%"></div></div>`;
        } else {
          btnContent = '✋ トークに参加する';
        }

        const card = document.createElement('div');
        card.className = 'member-card';
        card.innerHTML = `
          <div class="member-top">
            <div class="avatar" style="background:${m.bg};color:${m.fg}">${m.initials}</div>
            <div>
              <div class="member-name">${m.name}</div>
              <div class="member-status">${full ? '👑 コンプリート！' : `${s}/${MAX_STAMPS} スタンプ`}</div>
            </div>
          </div>
          <div class="stamps">${stampsHtml}</div>
          ${progressHtml}
          <button class="${btnClass}" id="btn-${i}" onclick="window.handleJoin(${i})" ${btnDisabled}>${btnContent}</button>
          <button class="reset-individual-btn" onclick="window.resetOne(${i})">🔄 ${m.name}をリセット</button>
        `;
        grid.appendChild(card);
      });
    }

    window.handleJoin = function(i) {
      if (joining[i] || (stamps[i] || 0) >= MAX_STAMPS) return;
      joining[i] = true;
      joinedAt[i] = Date.now();
      render();

      timers[i] = setInterval(() => {
        const elapsed = Date.now() - joinedAt[i];
        const pct = Math.min(100, elapsed / WAIT_MS * 100);
        const prog = document.getElementById(`prog-${i}`);
        if (prog) prog.style.width = pct.toFixed(1) + '%';
        const btn = document.getElementById(`btn-${i}`);
        const remain = Math.max(0, WAIT_MS - elapsed);
        const mins = Math.floor(remain / 60000);
        const secs = Math.floor((remain % 60000) / 1000);
        if (btn) btn.innerHTML = `<span class="timer-txt">⏱ ${mins}:${secs.toString().padStart(2,'0')} 待機中...</span>`;

        if (elapsed >= WAIT_MS) {
          clearInterval(timers[i]);
          joining[i] = false;
          joinedAt[i] = null;
          stamps[i] = Math.min(MAX_STAMPS, (stamps[i] || 0) + 1);
          saveStamps();
          render();
          if (stamps[i] >= MAX_STAMPS) {
            const banner = document.getElementById('reward-banner');
            document.getElementById('reward-name').textContent = MEMBERS[i].name;
            banner.classList.add('show');
            setTimeout(() => banner.classList.remove('show'), 5000);
          }
        }
      }, 500);
    };

    window.resetOne = function(i) {
      if (!confirm(`${MEMBERS[i].name}さんのスタンプをリセットしますか？`)) return;
      if (timers[i]) clearInterval(timers[i]);
      timers[i] = null;
      joining[i] = false;
      joinedAt[i] = null;
      stamps[i] = 0;
      saveStamps();
      render();
    };
  </script>
</body>
</html>
